---

x-restart: &restart
  restart: unless-stopped

x-tor-hardening: &tor-hardening
  cap_drop:
    - ALL
  read_only: true
  ipc: private
  security_opt:
    - no-new-privileges:true
  ulimits:
    core: 0

x-tor-tmpfs: &tor-tmpfs
  tmpfs:
    - /var/lib/tor:noexec,nosuid,nodev,size=100m,uid=100,gid=101,mode=0750
    - /var/log/tor:noexec,nosuid,nodev,size=50m,uid=100,gid=101,mode=1755
    - /tmp:noexec,nosuid,nodev,size=50m,uid=100,gid=101,mode=1777

# Per-container network namespace sysctls (safe to set without --privileged).
# Apply only to services with real network namespaces — skip network_mode:none (nginx, init-permissions).
# tcp_syncookies: mitigate SYN flood
# rp_filter=2: loose reverse-path filter — blocks spoofed sources, allows Docker bridge asymmetric routing
# accept_redirects=0: ignore ICMP redirects (routing manipulation vector)
# accept_source_route=0: ignore source-routed packets
# send_redirects=0: container is not a router, never emit ICMP redirects
x-tor-sysctls: &tor-sysctls
  sysctls:
    net.ipv4.tcp_syncookies: 1
    net.ipv4.conf.all.rp_filter: 2
    net.ipv4.conf.default.rp_filter: 2
    net.ipv4.conf.all.accept_redirects: 0
    net.ipv4.conf.default.accept_redirects: 0
    net.ipv6.conf.all.accept_redirects: 0
    net.ipv6.conf.default.accept_redirects: 0
    net.ipv4.conf.all.accept_source_route: 0
    net.ipv4.conf.default.accept_source_route: 0
    net.ipv4.conf.all.send_redirects: 0
    net.ipv4.conf.default.send_redirects: 0

x-tor-logging: &tor-logging
  logging:
    driver: local
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  gluetun:
    image: ghcr.io/qdm12/gluetun:v3.40.0
    container_name: gluetun
    profiles:
      - backend
      - frontend
      - app
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${MULLVAD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${MULLVAD_ADDRESSES:-10.0.0.1/32}
      - SERVER_COUNTRIES=${MULLVAD_SERVER_COUNTRIES:-Sweden}
      - SERVER_CITIES=${MULLVAD_SERVER_CITIES:-}
      - FIREWALL=on
      - DOT=off
      - DNS_ADDRESS=${MULLVAD_DNS}
    networks:
      - external
    <<: [*restart, *tor-logging]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9999/v1/vpn/status || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  init-permissions:
    image: alpine:3.22.0
    container_name: init-permissions
    profiles:
      - backend
      - frontend
      - app
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
    volumes:
      - ./domain:/var/lib/tor/hidden_service
      - ./shared:/run/app
    network_mode: "none"
    command: |
      sh -c "
      chown -R 100:101 /var/lib/tor/hidden_service && \
      chmod 700 /var/lib/tor/hidden_service && \
      chown -R 100:101 /run/app && \
      chmod 775 /run/app
      "
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M

  onionbalance:
    image: ${IMAGE_PREFIX:-ghcr.io/user-piotr/torsite}/tor-frontend:${TAG:-latest}
    container_name: tor-frontend
    profiles:
      - frontend
      - app
    build:
      context: .
      dockerfile: Dockerfile.tor-frontend
    <<: [*tor-hardening, *tor-tmpfs, *tor-sysctls, *restart, *tor-logging]
    environment:
      - VANGUARDS_CONFIG=/etc/tor/vanguards.conf
    volumes:
      - ./domain:/hs_keys
      - vanguards-state-frontend:/var/lib/tor/vanguards
    configs:
      - source: torrc-frontend
        target: /etc/tor/torrc
      - source: vanguards
        target: /etc/tor/vanguards.conf
      - source: ob-balance-config
        target: /onionbalance/config.yaml
    network_mode: "service:gluetun"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      gluetun:
        condition: service_healthy
    init: true
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "/etc/tor/scripts/get_tor_connection_status.py"]
      interval: 10s
      timeout: 10s
      start_period: 60s
      start_interval: 5s
      retries: 3
    labels:
      - "com.octo.service=onionbalance"
      - "com.octo.version=${VERSION:-dev}"

  tor-backend:
    image: ${IMAGE_PREFIX:-ghcr.io/user-piotr/torsite}/tor-backend:${TAG:-latest}
    profiles:
      - backend
      - app
    build:
      context: .
      dockerfile: Dockerfile.tor-backend
    <<: [*tor-hardening, *tor-tmpfs, *tor-sysctls, *restart, *tor-logging]
    environment:
      - VANGUARDS_CONFIG=/etc/tor/vanguards.conf
    volumes:
      - ./shared:/run/app/
      - vanguards-state-backend:/var/lib/tor/vanguards
    configs:
      - source: torrc-backend
        target: /etc/tor/torrc
      - source: vanguards
        target: /etc/tor/vanguards.conf
      - source: ob-config
        target: /etc/tor/ob_config
        uid: "100"
        gid: "101"
        mode: 0600
    network_mode: "service:gluetun"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      gluetun:
        condition: service_healthy
    init: true
    stop_grace_period: 60s
    deploy:
      mode: replicated
      replicas: ${REPLICAS:-2}
      endpoint_mode: vip
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "/etc/tor/scripts/get_tor_connection_status.py"]
      interval: 30s
      timeout: 20s
      start_period: 180s
      retries: 5
    labels:
      - "com.octo.service=tor"
      - "com.octo.version=${VERSION:-dev}"

  nginx:
    image: ${IMAGE_PREFIX:-ghcr.io/user-piotr/torsite}/nginx:${TAG:-latest}
    container_name: nginx
    profiles:
      - backend
      - app
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        - HUGO_BASEURL=http://${ONION_ADDRESS:-localhost:80}
        - NGINX_VERSION=1.27.5
    <<: [*tor-hardening, *restart]
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,nodev,size=50m,uid=101,gid=101,mode=1777
      - /tmp:noexec,nosuid,nodev,size=50m,uid=101,gid=101,mode=1777
    volumes:
      - ./shared:/run/app/
    network_mode: "none"
    logging:
      driver: none
    depends_on:
      tor-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "curl -I --fail --unix-socket /run/app/sock http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.octo.service=nginx"
      - "com.octo.version=${VERSION:-dev}"

  docker-socket-proxy:
    image: linuxserver/socket-proxy:3.2.16
    container_name: docker-socket-proxy
    profiles:
      - monitoring
    cap_drop:
      - ALL
    environment:
      CONTAINERS: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    <<: [*restart, *tor-logging]
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M

  kuma:
    image: louislam/uptime-kuma:2.2.1
    container_name: kuma
    profiles:
      - monitoring
    user: "1000:1000"
    cap_drop:
      - ALL
    cap_add:
      - SETGID
    environment:
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    networks:
      - external
      - internal
    ports:
      - "127.0.0.1:8080:3001"
    depends_on:
      tor-proxy:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    <<: [*restart, *tor-logging]
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  tor-proxy:
    image: ${IMAGE_PREFIX:-ghcr.io/user-piotr/torsite}/tor-proxy:${TAG:-latest}
    container_name: tor-proxy
    profiles:
      - monitoring
    build:
      context: .
      dockerfile: Dockerfile.tor-proxy
    <<: [*tor-hardening, *tor-tmpfs, *tor-sysctls, *restart, *tor-logging]
    configs:
      - source: torrc-proxy
        target: /etc/tor/torrc
    networks:
      - external
    ports:
      - "127.0.0.1:9050:9050"
    init: true
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "python", "/etc/tor/scripts/get_tor_connection_status.py"]
      interval: 30s
      timeout: 20s
      start_period: 180s
      retries: 5
    labels:
      - "com.octo.service=proxy"
      - "com.octo.version=${VERSION:-dev}"

volumes:
  vanguards-state-frontend: {}
  vanguards-state-backend: {}

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
    internal: true

  external:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
    internal: false

configs:
  torrc-frontend:
    file: ./conf/torrc-frontend
  torrc-backend:
    file: ./conf/torrc-backend
  torrc-proxy:
    file: ./conf/torrc-proxy
  vanguards:
    file: ./conf/vanguards.conf
  ob-config:
    file: ./conf/ob_config
  ob-balance-config:
    file: ./conf/config.yaml
