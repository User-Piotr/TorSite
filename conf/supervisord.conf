[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:tor]
command=tor -f /etc/tor/torrc --RunAsDaemon 0
priority=1
autorestart=true
startsecs=30
startretries=99
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:onionbalance]
command=/usr/local/bin/wait-for-tor.sh onionbalance -c /onionbalance/config.yaml -s /var/lib/tor/control
priority=2
autorestart=true
startsecs=10
startretries=99
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:vanguards]
command=/usr/local/bin/wait-for-tor.sh vanguards
priority=3
autorestart=true
startsecs=10
startretries=99
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
