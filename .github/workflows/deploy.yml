name: Build and Deploy

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      image_prefix: ${{ steps.meta.outputs.image_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image_prefix=ghcr.io/${OWNER}/${REPO}" >> $GITHUB_OUTPUT

      - name: Build and push tor-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tor-backend
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}/tor-backend:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image_prefix }}/tor-backend:latest
          cache-from: type=gha,scope=tor-backend
          cache-to: type=gha,scope=tor-backend,mode=max

      - name: Build and push tor-frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tor-frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}/tor-frontend:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image_prefix }}/tor-frontend:latest
          cache-from: type=gha,scope=tor-frontend
          cache-to: type=gha,scope=tor-frontend,mode=max

      - name: Build and push tor-proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tor-proxy
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}/tor-proxy:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image_prefix }}/tor-proxy:latest
          cache-from: type=gha,scope=tor-proxy
          cache-to: type=gha,scope=tor-proxy,mode=max

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}/nginx:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image_prefix }}/nginx:latest
          build-args: |
            NGINX_VERSION=1.27.5
            HUGO_BASEURL=${{ vars.HUGO_BASEURL }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,scope=nginx,mode=max

  deploy:
    name: Deploy
    needs: build
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Inject HS keys
        env:
          ONION_ADDRESS: ${{ vars.ONION_ADDRESS }}
        run: |
          # Extract hostname from address (strip http:// prefix)
          HOSTNAME=${ONION_ADDRESS#http://}
          ONION_DIR="domain/${HOSTNAME}"
          mkdir -p "$ONION_DIR"
          chmod 700 domain "$ONION_DIR"
          echo "${{ secrets.HS_SECRET_KEY }}" | base64 -d > "${ONION_DIR}/hs_ed25519_secret_key"
          echo "${{ secrets.HS_PUBLIC_KEY }}" | base64 -d > "${ONION_DIR}/hs_ed25519_public_key"
          echo "$HOSTNAME" > "${ONION_DIR}/hostname"
          chmod 600 "${ONION_DIR}/hs_ed25519_secret_key" "${ONION_DIR}/hs_ed25519_public_key"

      - name: Generate configs
        env:
          ONION_ADDRESS: ${{ vars.ONION_ADDRESS }}
        run: |
          HOSTNAME=${ONION_ADDRESS#http://}
          python3 scripts/config_generator.py ob_config \
            --master_onion_address "$ONION_ADDRESS"
          python3 scripts/config_generator.py config \
            --master_onion_address "$ONION_ADDRESS" \
            --domains ${{ vars.BACKEND_DOMAINS }} \
            --log_level notice \
            --log_location /var/log/tor/onionbalance.log \
            --key_path "/hs_keys/${HOSTNAME}/hs_ed25519_secret_key"
          python3 scripts/config_generator.py monitor_config \
            --master_onion_address "$ONION_ADDRESS"
          python3 scripts/config_generator.py basic_config

      - name: Pull and deploy
        env:
          TAG: ${{ needs.build.outputs.tag }}
          IMAGE_PREFIX: ${{ needs.build.outputs.image_prefix }}
        run: |
          docker compose -p octo pull
          docker compose -p octo --profile app up -d --remove-orphans
